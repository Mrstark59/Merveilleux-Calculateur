<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aux Merveilleux de Fred — Planning Semaine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --noir: #0e0c0a; --noir-2: #1a1714; --noir-3: #252118;
    --or: #c9a96e; --or-light: #e8d4a8; --creme: #f0e8d8; --blanc: #faf6ef;
    --choco-light: #6b3a1f; --text-muted: #8a7d6a; --border: rgba(201,169,110,0.2);
    --warn: #c47a4a;
  }
  body { background: var(--noir); color: var(--creme); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.6; }
 
  /* HEADER */
  header { text-align: center; padding: 2.5rem 2rem 1.5rem; border-bottom: 1px solid var(--border); }
  .header-ornament { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
  .ornament-line { height: 1px; width: 50px; background: linear-gradient(90deg, transparent, var(--or)); }
  .ornament-line.right { background: linear-gradient(90deg, var(--or), transparent); }
  .ornament-diamond { width: 5px; height: 5px; background: var(--or); transform: rotate(45deg); }
  .brand-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 300; letter-spacing: 0.08em; color: var(--blanc); line-height: 1; }
  .brand-name em { font-style: italic; color: var(--or); }
  .brand-sub { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.4rem; }
 
  /* NAV */
  .nav-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem; }
  .nav-tab { padding: 0.75rem 1.6rem; font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.3s, border-color 0.3s; margin-bottom: -1px; }
  .nav-tab.active { color: var(--or); border-bottom-color: var(--or); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
 
  /* MAIN */
  main { max-width: 1140px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .section-label { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--or); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 1rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
 
  /* SAISIE GRID */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 2rem; }
  .day-card { background: var(--noir-2); border: 1px solid var(--border); padding: 1rem 0.75rem 1.1rem; transition: border-color 0.3s; }
  .day-card:focus-within { border-color: rgba(201,169,110,0.45); }
  .day-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: var(--or-light); text-align: center; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .day-field { margin-bottom: 0.5rem; }
  .day-field label { display: block; font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
  .field-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
  .dot-c { background: #c47a4a; } .dot-s { background: var(--or); } .dot-r { background: #c47a6a; }
  .day-field input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(201,169,110,0.15); color: var(--blanc); font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; padding: 2px 0; outline: none; -moz-appearance: textfield; text-align: center; transition: border-color 0.3s; }
  .day-field input::-webkit-outer-spin-button, .day-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .day-field input:focus { border-bottom-color: var(--or); }
 
  /* PLANNING TABLE */
  .planning-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
 
  /* Header row */
  .th-creneau { width: 110px; }
  thead tr.head-jours th { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: var(--or-light); padding: 0.6rem 0.5rem 0.4rem; text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 0.04em; }
  thead tr.head-jours th.th-creneau { font-family: 'Jost', sans-serif; font-style: normal; font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); text-align: left; }
  thead tr.head-jours th.th-nextweek { border-left: 1px solid rgba(201,169,110,0.35); color: var(--or); }
  tbody td.td-nextweek { border-left: 1px solid rgba(201,169,110,0.2); }
  .day-card.nextweek { border-color: rgba(201,169,110,0.4); }
  .day-card.nextweek .day-name { color: var(--or); }
  thead tr.head-besoin th { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); padding: 0.3rem 0.5rem 0.6rem; text-align: center; border-bottom: 1px solid rgba(201,169,110,0.3); }
  thead tr.head-besoin th.th-creneau { text-align: left; }
  .besoin-val { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--creme); display: block; }
 
  /* Body rows */
  tbody tr { border-bottom: 1px solid rgba(201,169,110,0.07); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 0.7rem 0.5rem; text-align: center; vertical-align: middle; }
  td.cr-label { text-align: left; padding-left: 0; }
  .cr-time { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: var(--or); display: block; line-height: 1; }
  .cr-desc { font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); display: block; margin-top: 2px; }
 
  /* Cells */
  .cell-empty { color: rgba(138,125,106,0.25); font-size: 0.9rem; }
  .cell-block { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; }
  .cell-nb { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--blanc); line-height: 1; }
  .cell-type { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 8px; border: 1px solid; }
  .type-m  { color: #e0956a; border-color: rgba(196,122,74,0.45); background: rgba(59,31,15,0.2); }
  .type-sc { color: var(--or-light); border-color: rgba(201,169,110,0.35); background: rgba(201,169,110,0.04); }
  .type-c  { color: #c08060; border-color: rgba(107,58,31,0.5); background: rgba(59,31,15,0.18); }
  .cell-extra { font-size: 0.58rem; color: var(--warn); border: 1px solid rgba(196,122,74,0.4); padding: 1px 6px; margin-top: 1px; }
  .cell-warn { font-size: 0.56rem; color: var(--warn); margin-top: 2px; }
 
  /* TOTAL ROW */
  .row-total td { background: var(--noir-3); border-top: 1px solid rgba(201,169,110,0.25) !important; padding: 0.8rem 0.5rem; }
  .total-nb { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--or); line-height: 1; display: block; }
  .total-sub { font-size: 0.56rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
 
  /* LEGENDE */
  .legende { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 0.62rem; color: var(--text-muted); }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
 
  /* PRINT BTN */
  .btn-row { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
  .print-btn { background: transparent; border: 1px solid var(--or); color: var(--or); font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; padding: 0.75rem 1.8rem; cursor: pointer; position: relative; overflow: hidden; transition: color 0.4s; }
  .print-btn::before { content: ''; position: absolute; inset: 0; background: var(--or); transform: scaleX(0); transform-origin: left; transition: transform 0.4s cubic-bezier(0.77,0,0.175,1); }
  .print-btn:hover::before { transform: scaleX(1); }
  .print-btn:hover { color: var(--noir); }
  .print-btn span { position: relative; z-index: 1; }
 
  /* PRINT */
  @media print {
    body { background: white !important; color: black !important; }
    body::before { display: none; }
    header { border-bottom: 2px solid #c9a96e; padding: 0.8rem; }
    .brand-name { color: black !important; font-size: 1.8rem; }
    .brand-name em { color: #9a7040 !important; }
    .nav-tabs, .week-grid, .print-btn, .btn-row, .legende, #tab-saisie { display: none !important; }
    #tab-planning { display: block !important; }
    .section-label { color: #9a7040; }
    .section-label::after { background: #ddd; }
    thead tr.head-jours th { color: #333; border-bottom: 1px solid #c9a96e; }
    thead tr.head-besoin th { color: #666; border-bottom: 1px solid #ddd; }
    .besoin-val { color: #222; }
    tbody tr { border-bottom: 1px solid #eee; }
    td.cr-label .cr-time { color: #9a7040; }
    td.cr-label .cr-desc { color: #999; }
    .cell-nb { color: #111; }
    .type-m { color: #8B4513; border-color: #c47a4a; background: #fff8f4; }
    .type-sc { color: #7a6010; border-color: #c9a96e; background: #fffbf0; }
    .type-c { color: #4a2000; border-color: #8B4513; background: #fff5ee; }
    .row-total td { background: #f7f3eb; }
    .total-nb { color: #9a7040; }
    .total-sub { color: #888; }
    .cell-warn { color: #c0392b; }
    .cell-extra { color: #c0392b; border-color: #c0392b; }
    main { padding: 0.5rem; }
  }
 
  @media (max-width: 720px) { .week-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 440px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
 
<header>
  <div class="header-ornament">
    <div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line right"></div>
  </div>
  <h1 class="brand-name">Aux Merveilleux <em>de Fred</em></h1>
  <p class="brand-sub">Planning de production — Cramique en pousse</p>
</header>
 
<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('saisie')">Saisie semaine</div>
  <div class="nav-tab" onclick="switchTab('planning')">Planning journalier</div>
</div>
 
<main>
  <div class="tab-content active" id="tab-saisie">
    <br>
    <p class="section-label">Stock en pousse — nombre de cramiques par jour</p>
    <div class="week-grid" id="week-grid"></div>
  </div>
 
  <div class="tab-content" id="tab-planning">
    <br>
    <div class="legende">
      <div class="leg-item"><div class="leg-dot" style="background:#e0956a"></div>M = Mixte (3C + 2S + 1R)</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--or-light)"></div>S+C = Sucre+Choco (3C + 3S)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c08060"></div>C = Chocolat pur (6C)</div>
    </div>
    <div class="btn-row">
      <button class="print-btn" onclick="window.print()"><span>Imprimer le planning</span></button>
    </div>
    <p class="section-label">Répartition par créneau</p>
    <div class="planning-wrap">
      <table>
        <thead id="planning-head"></thead>
        <tbody id="planning-body"></tbody>
      </table>
    </div>
  </div>
</main>
 
<script>
const JOURS = ['Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche','Lundi','Mardi S+1'];
const MAX = 12;
 
function buildGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  JOURS.forEach(j => {
    grid.innerHTML += `<div class="day-card">
      <div class="day-name">${j}</div>
      <div class="day-field"><label><span class="field-dot dot-c"></span>Choco</label>
        <input type="number" id="${j}-c" min="0" value="0" oninput="buildPlanning()"/></div>
      <div class="day-field"><label><span class="field-dot dot-s"></span>Sucre</label>
        <input type="number" id="${j}-s" min="0" value="0" oninput="buildPlanning()"/></div>
      <div class="day-field"><label><span class="field-dot dot-r"></span>Raisin</label>
        <input type="number" id="${j}-r" min="0" value="0" oninput="buildPlanning()"/></div>
    </div>`;
  });
}
 
function calcPlaques(c, s, r) {
  let choco = c, sucre = s, raisin = r;
  // Étape 1 : Mixtes
  let m = raisin;
  choco -= m*3; sucre -= m*2;
  choco = Math.max(0,choco); sucre = Math.max(0,sucre);
  // Étape 2 : S+C
  let sc = Math.floor(Math.min(sucre/3, choco/3));
  choco -= sc*3; sucre -= sc*3;
  choco = Math.max(0, choco);
  // Étape 3 : Choco
  let cFull = Math.floor(choco/6);
  let cRest = choco - cFull*6; // unités restantes
  let cPlaques = cFull + (cRest > 0 ? 1 : 0); // nb plaques dont 1 incomplète
  // Total = plaques complètes seulement (incomplète non comptée)
  let total = m + sc + cFull;
  return { m, sc, cFull, cRest, cPlaques, total };
}
 
function repartir(p) {
  // M : moitié J-1 (max 12), moitié 13H (max 12), surplus → divisé 6H + 10H
  let mJ1  = Math.min(Math.ceil(p.m / 2), MAX);
  let m13h = Math.min(p.m - mJ1, MAX);
  let mSurplus = p.m - mJ1 - m13h; // ce qui dépasse 24
  let m6h  = Math.ceil(mSurplus / 2);
  let m10h = mSurplus - m6h;
 
  // S+C → 6H (max 12 - m6h), débordement → 10H
  let dispo6h  = MAX - m6h;
  let sc6h     = Math.min(p.sc, dispo6h);
  let sc10h    = p.sc - sc6h;
 
  // CHOCO → 10H (max 12 - m10h - sc10h), débordement → 13H
  let dispo10h = MAX - m10h - sc10h;
  let c10h     = Math.min(p.cFull, Math.max(0, dispo10h));
  let cDebord  = p.cFull - c10h;
 
  return {
    'J-1' : { m: mJ1,  sc: 0,     c: 0,      cRest: 0,       total: mJ1 },
    '6H'  : { m: m6h,  sc: sc6h,  c: 0,      cRest: 0,       total: m6h + sc6h },
    '10H' : { m: m10h, sc: sc10h, c: c10h,   cRest: p.cRest, total: m10h + sc10h + c10h },
    '13H' : { m: m13h, sc: 0,     c: cDebord, cRest: 0,       total: m13h + cDebord },
  };
}
 
function buildPlanning() {
  const data = JOURS.map(j => {
    const c = parseInt(document.getElementById(j+'-c').value)||0;
    const s = parseInt(document.getElementById(j+'-s').value)||0;
    const r = parseInt(document.getElementById(j+'-r').value)||0;
    const p = calcPlaques(c,s,r);
    return { jour: j, c, s, r, p, rep: repartir(p) };
  });
 
  // HEAD
  let head = `
    <tr class="head-jours">
      <th class="th-creneau">Créneau</th>
      ${data.map(d=>`<th class="${d.jour==='Mardi S+1'?'th-nextweek':''}">${d.jour==='Mardi S+1'?'Mardi <span style="font-size:0.7rem;font-style:normal;letter-spacing:0.15em;color:var(--or);opacity:0.8">S+1</span>':d.jour}</th>`).join('')}
    </tr>
    <tr class="head-besoin">
      <th class="th-creneau">Besoin</th>
      ${data.map(d=>`<th class="${d.jour==='Mardi S+1'?'th-nextweek':''}"><span class="besoin-val">${d.p.total > 0 ? d.p.total : '—'}</span>plaques</th>`).join('')}
    </tr>`;
  document.getElementById('planning-head').innerHTML = head;
 
  // BODY
  const CRENEAUX = [
    { id:'J-1', label:'J-1',  desc:'Veille' },
    { id:'6H',  label:'6H',   desc:'Matin' },
    { id:'10H', label:'10H',  desc:'Mi-journée' },
    { id:'13H', label:'13H',  desc:'Après-midi' },
  ];
 
  let body = '';
  CRENEAUX.forEach(cr => {
    body += `<tr><td class="cr-label"><span class="cr-time">${cr.label}</span><span class="cr-desc">${cr.desc}</span></td>`;
    data.forEach(d => {
      const r = d.rep[cr.id];
      const warn = r.total > MAX;
      let html = '';
 
      if (cr.id === 'J-1') {
        if (r.m > 0) html = `<div class="cell-block"><span class="cell-nb">${r.m}</span><span class="cell-type type-m">M</span></div>`;
        else html = '<span class="cell-empty">—</span>';
      } else if (cr.id === '6H') {
        if (r.m > 0 || r.sc > 0) {
          html = '<div class="cell-block">';
          if (r.m  > 0) html += `<span class="cell-nb">${r.m}</span><span class="cell-type type-m">M</span>`;
          if (r.sc > 0) html += `<span class="cell-nb" style="margin-top:4px">${r.sc}</span><span class="cell-type type-sc">S+C</span>`;
          html += '</div>';
        } else html = '<span class="cell-empty">—</span>';
      } else if (cr.id === '10H') {
        if (r.m > 0 || r.sc > 0 || r.c > 0 || r.cRest > 0) {
          html = '<div class="cell-block">';
          if (r.m  > 0) html += `<span class="cell-nb">${r.m}</span><span class="cell-type type-m">M</span>`;
          if (r.sc > 0) html += `<span class="cell-nb" style="margin-top:4px">${r.sc}</span><span class="cell-type type-sc">S+C</span>`;
          if (r.c  > 0) html += `<span class="cell-nb" style="margin-top:4px">${r.c}</span><span class="cell-type type-c">CHOCO</span>`;
          if (r.cRest > 0) html += `<span class="cell-extra">+ ${r.cRest} unité${r.cRest>1?'s':''}</span>`;
          html += '</div>';
        } else html = '<span class="cell-empty">—</span>';
      } else if (cr.id === '13H') {
        if (r.m > 0 || r.c > 0) {
          html = '<div class="cell-block">';
          if (r.m > 0) html += `<span class="cell-nb">${r.m}</span><span class="cell-type type-m">M</span>`;
          if (r.c > 0) html += `<span class="cell-nb" style="margin-top:4px">${r.c}</span><span class="cell-type type-c">CHOCO</span>`;
          html += '</div>';
        } else html = '<span class="cell-empty">—</span>';
      }
 
      if (warn) html += `<div class="cell-warn">⚠ ${r.total} pl.</div>`;
      body += `<td class="${d.jour==='Mardi S+1'?'td-nextweek':''}">${html}</td>`;
    });
    body += '</tr>';
  });
 
  // Total row
  body += `<tr class="row-total"><td class="cr-label"><span class="cr-time" style="font-style:normal;font-size:0.9rem;letter-spacing:0.1em">Total</span><span class="cr-desc">Journée</span></td>`;
  data.forEach(d => {
    body += `<td><span class="total-nb">${d.p.total > 0 ? d.p.total : '—'}</span><span class="total-sub">${d.p.total > 0 ? d.p.total*6 + ' pcs' : ''}</span></td>`;
  });
  body += '</tr>';
 
  document.getElementById('planning-body').innerHTML = body;
}
 
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', ['saisie','planning'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'planning') buildPlanning();
}
 
buildGrid();
buildPlanning();
</script>
</body>
</html>
